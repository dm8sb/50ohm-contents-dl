    reset();
    for (let i = 0; i <= idx; i++) paintChar(i);
    lastIdx = idx;
  }

  function paintChar(i) {
    const ev = EVENTS[i];
    const b  = bubbles[ev.b];
    b.classList.remove("d-none");
    b.textContent += (ev.sp ? " " : "") + ev.t;
  }

  function tick() {
    const t = audio.currentTime * 1000;
    let idx = -1;
    for (let i = 0; i < EVENTS.length; i++) {
      if (EVENTS[i].ms <= t) idx = i; else break;
    }

    if (idx !== lastIdx) {
      if (idx < lastIdx) {
        renderUpTo(idx);
      } else {
        for (let i = lastIdx + 1; i <= idx; i++) paintChar(i);
        lastIdx = idx;
      }
    }

    if (audio.duration) {
      prog.style.width = (audio.currentTime / audio.duration * 100) + "%";
      timeEl.textContent = fmt(audio.currentTime) + " / " + fmt(audio.duration);
    }

    if (!audio.paused) raf = requestAnimationFrame(tick);
  }

  audio.addEventListener("play",  () => { btnPlay.innerHTML = "&#10074;&#10074; Pause"; raf = requestAnimationFrame(tick); });
  audio.addEventListener("pause", () => { btnPlay.innerHTML = "&#9654; Play"; cancelAnimationFrame(raf); });
  audio.addEventListener("ended", () => { btnPlay.innerHTML = "&#9654; Play"; cancelAnimationFrame(raf); tick(); });

  btnPlay.addEventListener("click", () => { audio.paused ? audio.play() : audio.pause(); });

  btnStop.addEventListener("click", () => {
    audio.pause();
    audio.currentTime = 0;
    cancelAnimationFrame(raf);
    reset();
    prog.style.width = "0%";
    timeEl.textContent = "0:00 / " + (audio.duration ? fmt(audio.duration) : "0:00");
  });

  progWrap.addEventListener("click", e => {
    if (!audio.duration) return;
    const r = progWrap.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
    if (audio.paused) { renderUpTo(-1); const t=audio.currentTime*1000; let idx=-1; for(let i=0;i<EVENTS.length;i++){if(EVENTS[i].ms<=t)idx=i;else break;} if(idx>=0)renderUpTo(idx); }
  });
})();
</script>
